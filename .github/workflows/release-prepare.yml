name: Prepare Release Branch

on:
  workflow_dispatch:
    inputs:
      release_date:
        description: 'Release date (YYYY-MM-DD). Defaults to today.'
        required: false
        type: string
        default: ''
      feature_branches:
        description: 'Feature branches to merge (one per line or comma-separated). Example: feature/auth, feature/payments'
        required: true
        type: string
      push_feature_branches:
        description: 'Push updated feature branches to remote (after merging prev release into them)'
        required: false
        type: boolean
        default: true
      merge_into_master:
        description: 'Merge the new release into master when done'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-prepare-${{ inputs.release_date || 'today' }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        env:
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          git config user.name "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"

      - name: Resolve release date and branch names
        id: vars
        env:
          INPUT_RELEASE_DATE: ${{ inputs.release_date }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [[ -n "$INPUT_RELEASE_DATE" ]]; then
            RELEASE_DATE="$INPUT_RELEASE_DATE"
          else
            RELEASE_DATE=$(date +%Y-%m-%d)
          fi

          NEW_RELEASE="release/${RELEASE_DATE}"

          # Auto-detect previous release branch (latest by date, excluding the new one)
          PREV_RELEASE=$(git branch -r \
            | grep -oE 'origin/release/[0-9]{4}-[0-9]{2}-[0-9]{2}' \
            | sed 's|origin/||' \
            | grep -v "^${NEW_RELEASE}$" \
            | sort -r \
            | head -1)

          if [[ -z "$PREV_RELEASE" ]]; then
            echo "::notice::No previous release branch found — first release will be created from '${DEFAULT_BRANCH}'."
            IS_FIRST_RELEASE="true"
            PREV_RELEASE="$DEFAULT_BRANCH"
          else
            IS_FIRST_RELEASE="false"
          fi

          echo "release_date=${RELEASE_DATE}"       >> "$GITHUB_OUTPUT"
          echo "new_release=${NEW_RELEASE}"          >> "$GITHUB_OUTPUT"
          echo "prev_release=${PREV_RELEASE}"        >> "$GITHUB_OUTPUT"
          echo "is_first_release=${IS_FIRST_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Print plan
        env:
          NEW_RELEASE: ${{ steps.vars.outputs.new_release }}
          PREV_RELEASE: ${{ steps.vars.outputs.prev_release }}
          IS_FIRST_RELEASE: ${{ steps.vars.outputs.is_first_release }}
          ACTOR: ${{ github.actor }}
          MERGE_INTO_MASTER: ${{ inputs.merge_into_master }}
          FEATURE_BRANCHES: ${{ inputs.feature_branches }}
        run: |
          PREV_LABEL="${PREV_RELEASE}"
          if [[ "$IS_FIRST_RELEASE" == "true" ]]; then
            PREV_LABEL="${PREV_RELEASE} (first release — no previous release branch)"
          fi

          echo "## Release Preparation Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| New release | \`${NEW_RELEASE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Base branch | \`${PREV_LABEL}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | @${ACTOR} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Merge into master | ${MERGE_INTO_MASTER} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "🔀 New release:  ${NEW_RELEASE}"
          echo "⬅️  Base branch: ${PREV_LABEL}"
          echo "📋 Feature branches: ${FEATURE_BRANCHES}"

      - name: Create release branch from previous release
        env:
          NEW_RELEASE: ${{ steps.vars.outputs.new_release }}
          PREV_RELEASE: ${{ steps.vars.outputs.prev_release }}
        run: |
          if git show-ref --verify --quiet "refs/remotes/origin/${NEW_RELEASE}"; then
            echo "⚠️  Branch '${NEW_RELEASE}' already exists on remote — checking it out."
            git checkout -b "${NEW_RELEASE}" "origin/${NEW_RELEASE}"
          else
            echo "Creating ${NEW_RELEASE} from origin/${PREV_RELEASE}..."
            git checkout -b "${NEW_RELEASE}" "origin/${PREV_RELEASE}"
            git push origin "${NEW_RELEASE}"
            echo "✅ Created and pushed ${NEW_RELEASE}"
          fi

      - name: Merge feature branches into release
        id: merge
        env:
          NEW_RELEASE: ${{ steps.vars.outputs.new_release }}
          PREV_RELEASE: ${{ steps.vars.outputs.prev_release }}
          IS_FIRST_RELEASE: ${{ steps.vars.outputs.is_first_release }}
          PUSH_FEATURES: ${{ inputs.push_feature_branches }}
          FEATURE_BRANCHES: ${{ inputs.feature_branches }}
        run: |
          # Normalize input: support both comma and newline separators
          BRANCHES=$(echo "$FEATURE_BRANCHES" | tr ',' '\n' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' | grep -v '^$')

          MERGED=()
          FAILED=()

          while IFS= read -r FEATURE; do
            echo ""
            echo "━━━ Processing: ${FEATURE} ━━━"

            # Verify branch exists on remote
            if ! git show-ref --verify --quiet "refs/remotes/origin/${FEATURE}"; then
              echo "::error::Branch '${FEATURE}' not found on remote."
              FAILED+=("${FEATURE} (not found on remote)")
              continue
            fi

            # Checkout feature branch
            if git show-ref --verify --quiet "refs/heads/${FEATURE}"; then
              git checkout "${FEATURE}"
              git pull origin "${FEATURE}"
            else
              git checkout -b "${FEATURE}" "origin/${FEATURE}"
            fi

            # Merge previous release into feature branch (skip on first release)
            if [[ "$IS_FIRST_RELEASE" == "false" ]]; then
              echo "Merging ${PREV_RELEASE} → ${FEATURE}..."
              if ! git merge --no-ff "origin/${PREV_RELEASE}" -m "Merge ${PREV_RELEASE} into ${FEATURE}"; then
                echo "::error::Conflict merging ${PREV_RELEASE} into ${FEATURE}. Resolve manually."
                git merge --abort
                FAILED+=("${FEATURE} (conflict with ${PREV_RELEASE})")
                git checkout "${NEW_RELEASE}"
                continue
              fi

              if [[ "$PUSH_FEATURES" == "true" ]]; then
                git push origin "${FEATURE}"
              fi
            else
              echo "ℹ️  First release — skipping merge of ${PREV_RELEASE} into ${FEATURE}"
            fi

            # Merge feature branch into new release
            echo "Merging ${FEATURE} → ${NEW_RELEASE}..."
            git checkout "${NEW_RELEASE}"

            if ! git merge --no-ff "${FEATURE}" -m "Merge ${FEATURE} into ${NEW_RELEASE}"; then
              echo "::error::Conflict merging ${FEATURE} into ${NEW_RELEASE}. Resolve manually."
              git merge --abort
              FAILED+=("${FEATURE} (conflict with ${NEW_RELEASE})")
              continue
            fi

            echo "✅ Merged ${FEATURE} into ${NEW_RELEASE}"
            MERGED+=("${FEATURE}")

          done <<< "$BRANCHES"

          # Push updated release branch
          git push origin "${NEW_RELEASE}"
          echo "✅ Pushed ${NEW_RELEASE}"

          # Write summary
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Merge Results" >> "$GITHUB_STEP_SUMMARY"

          if [[ ${#MERGED[@]} -gt 0 ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ✅ Merged successfully" >> "$GITHUB_STEP_SUMMARY"
            for b in "${MERGED[@]}"; do
              echo "- \`${b}\`" >> "$GITHUB_STEP_SUMMARY"
            done
          fi

          if [[ ${#FAILED[@]} -gt 0 ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ❌ Failed" >> "$GITHUB_STEP_SUMMARY"
            for b in "${FAILED[@]}"; do
              echo "- \`${b}\`" >> "$GITHUB_STEP_SUMMARY"
            done
            echo "FAILED_COUNT=${#FAILED[@]}" >> "$GITHUB_ENV"
          else
            echo "FAILED_COUNT=0" >> "$GITHUB_ENV"
          fi

      - name: Merge release into master
        if: ${{ inputs.merge_into_master == true }}
        env:
          NEW_RELEASE: ${{ steps.vars.outputs.new_release }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          echo "Merging ${NEW_RELEASE} → ${DEFAULT_BRANCH}..."
          git checkout "$DEFAULT_BRANCH"
          git pull origin "$DEFAULT_BRANCH"

          if ! git merge --no-ff "${NEW_RELEASE}" -m "Merge ${NEW_RELEASE} into ${DEFAULT_BRANCH}"; then
            echo "::error::Conflict merging ${NEW_RELEASE} into ${DEFAULT_BRANCH}. Resolve manually."
            git merge --abort
            exit 1
          fi

          git push origin "$DEFAULT_BRANCH"
          echo "✅ Merged ${NEW_RELEASE} → ${DEFAULT_BRANCH} and pushed"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Master" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ \`${NEW_RELEASE}\` merged into \`${DEFAULT_BRANCH}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Final summary
        env:
          NEW_RELEASE: ${{ steps.vars.outputs.new_release }}
          MERGE_INTO_MASTER: ${{ inputs.merge_into_master }}
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Next Steps" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${FAILED_COUNT}" -gt 0 ]]; then
            echo "1. Resolve merge conflicts listed above manually" >> "$GITHUB_STEP_SUMMARY"
            echo "2. Re-run workflow for the failed branches" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$MERGE_INTO_MASTER" != "true" ]]; then
            echo "- Merge into master when ready: \`git merge --no-ff ${NEW_RELEASE}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "- Update **Jenkins** to deploy branch: \`${NEW_RELEASE}\`" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${FAILED_COUNT}" -gt 0 ]]; then
            echo "⚠️  Completed with ${FAILED_COUNT} failed branch(es). Check the summary above."
            exit 1
          else
            echo "🎉 Release branch ${NEW_RELEASE} is ready!"
          fi
